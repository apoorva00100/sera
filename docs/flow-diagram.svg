<svg viewBox="0 0 1040 1160" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowMain" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#F62681"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8a7d77"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="1160" fill="#0b0807"/>

  <!-- ===== Side panel: Live Session View ===== -->
  <rect x="650" y="40" width="330" height="1080" rx="16" fill="#16110f" stroke="#3a2f2b" stroke-width="1.5"/>
  <text x="815" y="75" text-anchor="middle" fill="#F62681" font-size="16" font-weight="600">Live Session View</text>
  <text x="815" y="96" text-anchor="middle" fill="#b8ada6" font-size="12">(streamed to the browser over SSE)</text>
  <text x="815" y="580" text-anchor="middle" fill="#5c5250" font-size="12" font-style="italic">every step below</text>
  <text x="815" y="598" text-anchor="middle" fill="#5c5250" font-size="12" font-style="italic">emits an event here</text>

  <!-- ===== Main flow nodes ===== -->
  <!-- n1 Task Submitted -->
  <rect x="130" y="40" width="240" height="54" rx="10" fill="#16110f" stroke="#F62681" stroke-width="1.5"/>
  <text x="250" y="72" text-anchor="middle" fill="#f5efe9" font-size="15" font-weight="600">Task Submitted</text>

  <!-- n2 Decompose -->
  <rect x="130" y="124" width="240" height="54" rx="10" fill="#16110f" stroke="#3a2f2b" stroke-width="1.5"/>
  <text x="250" y="156" text-anchor="middle" fill="#f5efe9" font-size="15">Decompose</text>

  <!-- n3 Generate Candidates -->
  <rect x="130" y="208" width="240" height="54" rx="10" fill="#16110f" stroke="#3a2f2b" stroke-width="1.5"/>
  <text x="250" y="240" text-anchor="middle" fill="#f5efe9" font-size="15">Generate 3 Candidates</text>

  <!-- n4 Score Candidates -->
  <rect x="130" y="292" width="240" height="54" rx="10" fill="#16110f" stroke="#3a2f2b" stroke-width="1.5"/>
  <text x="250" y="324" text-anchor="middle" fill="#f5efe9" font-size="15">Score Candidates</text>

  <!-- d1 Gate Needed? (diamond) -->
  <polygon points="250,375 360,430 250,485 140,430" fill="#16110f" stroke="#F62681" stroke-width="1.5"/>
  <text x="250" y="435" text-anchor="middle" fill="#f5efe9" font-size="14">Gate needed?</text>

  <!-- n5 Pause & Ask User (side branch) -->
  <rect x="450" y="402" width="220" height="54" rx="10" fill="#16110f" stroke="#3a2f2b" stroke-width="1.5"/>
  <text x="560" y="434" text-anchor="middle" fill="#f5efe9" font-size="15">Pause &amp; Ask User</text>

  <!-- n6 Save Preference -->
  <rect x="450" y="486" width="220" height="54" rx="10" fill="#16110f" stroke="#3a2f2b" stroke-width="1.5"/>
  <text x="560" y="518" text-anchor="middle" fill="#f5efe9" font-size="15">Save Preference</text>

  <!-- n7 Execute Best Prompt -->
  <rect x="130" y="590" width="240" height="54" rx="10" fill="#16110f" stroke="#F62681" stroke-width="1.5"/>
  <text x="250" y="622" text-anchor="middle" fill="#f5efe9" font-size="15" font-weight="600">Execute Best Prompt</text>

  <!-- n8 Critique Output -->
  <rect x="130" y="674" width="240" height="54" rx="10" fill="#16110f" stroke="#3a2f2b" stroke-width="1.5"/>
  <text x="250" y="706" text-anchor="middle" fill="#f5efe9" font-size="15">Critique Output</text>

  <!-- d2 Score >= 7? (diamond) -->
  <polygon points="250,785 360,830 250,875 140,830" fill="#16110f" stroke="#3a2f2b" stroke-width="1.5"/>
  <text x="250" y="826" text-anchor="middle" fill="#f5efe9" font-size="14">Score &#8805; 7?</text>
  <text x="250" y="842" text-anchor="middle" fill="#8a7d77" font-size="11">(else reprompt)</text>

  <!-- d3 More Subtasks? (diamond) -->
  <polygon points="250,915 360,960 250,1005 140,960" fill="#16110f" stroke="#3a2f2b" stroke-width="1.5"/>
  <text x="250" y="965" text-anchor="middle" fill="#f5efe9" font-size="14">More subtasks?</text>

  <!-- n9 Final Output -->
  <rect x="130" y="1050" width="240" height="54" rx="10" fill="#16110f" stroke="#F62681" stroke-width="2"/>
  <text x="250" y="1082" text-anchor="middle" fill="#F62681" font-size="15" font-weight="700">Final Output</text>

  <!-- ===== Main flow arrows ===== -->
  <line x1="250" y1="94" x2="250" y2="124" stroke="#F62681" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <line x1="250" y1="178" x2="250" y2="208" stroke="#F62681" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <line x1="250" y1="262" x2="250" y2="292" stroke="#F62681" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <line x1="250" y1="346" x2="250" y2="375" stroke="#F62681" stroke-width="1.5" marker-end="url(#arrowMain)"/>

  <!-- Gate: No -> Execute -->
  <line x1="250" y1="485" x2="250" y2="590" stroke="#F62681" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <text x="264" y="540" fill="#b8ada6" font-size="12">no</text>

  <!-- Gate: Yes -> Pause & Ask User -->
  <line x1="360" y1="430" x2="450" y2="429" stroke="#F62681" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <text x="378" y="422" fill="#b8ada6" font-size="12">yes</text>

  <line x1="560" y1="456" x2="560" y2="486" stroke="#3a2f2b" stroke-width="1.5" marker-end="url(#arrowMuted)"/>

  <!-- Save Preference -> back into Execute -->
  <polyline points="560,540 560,617 370,617" fill="none" stroke="#3a2f2b" stroke-width="1.5" marker-end="url(#arrowMuted)"/>

  <line x1="250" y1="644" x2="250" y2="674" stroke="#3a2f2b" stroke-width="1.5" marker-end="url(#arrowMuted)"/>
  <line x1="250" y1="728" x2="250" y2="785" stroke="#3a2f2b" stroke-width="1.5" marker-end="url(#arrowMuted)"/>

  <!-- d2 No -> loop back to Execute -->
  <polyline points="140,830 80,830 80,617 130,617" fill="none" stroke="#F62681" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <text x="30" y="726" fill="#b8ada6" font-size="12">no, reprompt</text>

  <!-- d2 Yes -> d3 -->
  <line x1="250" y1="875" x2="250" y2="915" stroke="#3a2f2b" stroke-width="1.5" marker-end="url(#arrowMuted)"/>
  <text x="264" y="899" fill="#b8ada6" font-size="12">yes</text>

  <!-- d3 Yes -> loop back to Decompose -->
  <polyline points="140,960 40,960 40,151 130,151" fill="none" stroke="#F62681" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <text x="8" y="556" fill="#b8ada6" font-size="12" transform="rotate(-90 20,556)">yes, next subtask</text>

  <!-- d3 No -> Final Output -->
  <line x1="250" y1="1005" x2="250" y2="1050" stroke="#F62681" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <text x="264" y="1032" fill="#b8ada6" font-size="12">no</text>

  <!-- ===== Dashed SSE connectors into side panel ===== -->
  <line x1="370" y1="151" x2="650" y2="151" stroke="#6b5f5a" stroke-width="1.25" stroke-dasharray="5,5" marker-end="url(#arrowMuted)"/>
  <line x1="370" y1="235" x2="650" y2="235" stroke="#6b5f5a" stroke-width="1.25" stroke-dasharray="5,5" marker-end="url(#arrowMuted)"/>
  <line x1="370" y1="319" x2="650" y2="319" stroke="#6b5f5a" stroke-width="1.25" stroke-dasharray="5,5" marker-end="url(#arrowMuted)"/>
  <line x1="360" y1="430" x2="650" y2="380" stroke="#6b5f5a" stroke-width="1.25" stroke-dasharray="5,5" marker-end="url(#arrowMuted)"/>
  <line x1="370" y1="701" x2="650" y2="701" stroke="#6b5f5a" stroke-width="1.25" stroke-dasharray="5,5" marker-end="url(#arrowMuted)"/>
  <line x1="370" y1="1077" x2="650" y2="1077" stroke="#6b5f5a" stroke-width="1.25" stroke-dasharray="5,5" marker-end="url(#arrowMuted)"/>
</svg>
